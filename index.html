<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Raghu Medicare | Patient Portal</title>
</head>
<body>

    <header class="main-header">
        <h1 class="brand-name">RAGHU MEDICARE</h1>
        <nav class="navbar">
            <button class="nav-btn" onclick="showSection('home')">Home</button>
            <button class="nav-btn" onclick="showSection('reports')">Reports</button>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="hero-content">
            <h2>Premium Healthcare Services</h2>
            <p>Your Health, Our Priority. Expert diagnosis and compassionate care.</p>
        </div>
        <img src="doctor-consultation.png" alt="Doctor Consultation" class="hero-img">
    </section>

    <section id="reports" style="display:none;" class="report-section">
        <h2>Diagnostic Reports Portal</h2>
        <div class="report-list">
            <a href="cbp.html" class="report-item">CBP Report</a>
            <a href="dengue.html" class="report-item">Dengue Report</a>
            <a href="lft.html" class="report-item">LFT Report</a>
            <a href="diabetic.html" class="report-item">Diabetic Report</a>
            <a href="gtt.html" class="report-item">GTT Report</a>
        </div>
    </section>

    <script>
        function showSection(id) {
            document.getElementById('home').style.display = (id === 'home') ? 'flex' : 'none';
            document.getElementById('reports').style.display = (id === 'reports') ? 'block' : 'none';
        }
    </script>
</body>
</html>
