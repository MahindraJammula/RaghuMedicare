<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header><h1>RAGHU MEDICARE</h1></header>

    <select id="reportSelector" onchange="showReport()">
        <option value="">-- Select Report --</option>
        <option value="cbp">CBP Report</option>
        <option value="dengue">Dengue Report</option>
        <option value="diabetic">Diabetic Report</option>
    </select>

    <div id="reportContainer"></div>

    <script>
        const reports = {
            cbp: {
                title: "CBP Report",
                columns: ["Hemoglobin", "T.W.B.C", "Platelet Count"]
            },
            dengue: {
                title: "Dengue Report",
                columns: ["Dengue Ns1 Ag", "IgG", "IgM"]
            }
        };

        function showReport() {
            let val = document.getElementById('reportSelector').value;
            let container = document.getElementById('reportContainer');
            if(!val) { container.innerHTML = ""; return; }

            let report = reports[val];
            let html = `<h2>${report.title}</h2>`;
            
            report.columns.forEach(col => {
                html += `
                    <div class="col-row" id="row-${col}">
                        <input type="checkbox" checked onclick="toggleRow('${col}')">
                        <label>${col}</label>
                        <input type="text" placeholder="Enter value">
                    </div>`;
            });
            container.innerHTML = html;
        }

        function toggleRow(id) {
            let row = document.getElementById('row-' + id);
            row.style.opacity = (row.style.opacity == "0.3") ? "1" : "0.3";
        }
    </script>
</body>
</html>
