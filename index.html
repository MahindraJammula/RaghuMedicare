<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Raghu Medicare | Premium Healthcare</title>
</head>
<body>

    <header class="main-header">
        <h1 class="brand-name">RAGHU MEDICARE</h1>
        <nav class="navbar">
            <button onclick="showSection('home')">Home</button>
            <button onclick="showSection('reports')">Reports</button>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="hero-content">
            <h2>Excellence in Medical Care</h2>
            <p>Your health is our priority. Expert diagnosis and compassionate care.</p>
        </div>
        <img src="https://images.unsplash.com/photo-1579684385127-1ecd15d5688d?auto=format&fit=crop&q=80&w=1200" alt="Doctor examining patient" class="hero-img">
    </section>

    <section id="reports" style="display:none;" class="report-section">
        <h2>Diagnostic Reports</h2>
        <div class="print-labels">
            <div class="data-row"><span>Hemoglobin</span><span>7.0 g/dl</span></div>
            <div class="data-row"><span>Creatinine</span><span>1.2 mg/dl</span></div>
        </div>
    </section>

    <script>
        function showSection(id) {
            document.getElementById('home').style.display = (id === 'home') ? 'flex' : 'none';
            document.getElementById('reports').style.display = (id === 'reports') ? 'block' : 'none';
        }
    </script>
</body>
</html>
