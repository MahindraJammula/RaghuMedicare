<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>CBP Report | Raghu Medicare</title>
</head>
<body>
    <header class="main-header">
        <h1 class="brand-name">RAGHU MEDICARE</h1>
        <nav class="navbar"><a href="index.html" class="nav-btn">Back to Home</a></nav>
    </header>

    <div class="report-container">
        <h2>CBP Diagnostic Report</h2>
        <button onclick="window.print()" class="no-print nav-btn">🖨️ Print A4</button>

        <!-- Section 1: Hematology -->
        <div class="section">
            <h3 onclick="toggle('sec1')">Hematology Section ▼</h3>
            <div id="sec1">
                <div class="row"><input type="checkbox" checked><label>Hemoglobin</label><input type="text"></div>
                <div class="row"><input type="checkbox" checked><label>T.W.B.C</label><input type="text"></div>
            </div>
        </div>

        <!-- Section 2: Widal/Serology -->
        <div class="section">
            <h3 onclick="toggle('sec2')">Widal & Serology ▼</h3>
            <div id="sec2">
                <div class="row"><input type="checkbox" checked><label>S.Typhi 'O'</label><input type="text"></div>
            </div>
        </div>

        <!-- Section 3: Urine Analysis -->
        <div class="section">
            <h3 onclick="toggle('sec3')">Urine Analysis ▼</h3>
            <div id="sec3">
                <div class="row"><input type="checkbox" checked><label>Specific Gravity</label><input type="text"></div>
            </div>
        </div>
    </div>

    <script>
        function toggle(id) {
            let el = document.getElementById(id);
            el.style.display = (el.style.display === "none") ? "block" : "none";
        }
    </script>
</body>
</html>
