<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>CBP Diagnostic Report</title>
</head>
<body>
    <header class="main-header">
        <h1 class="brand-name">RAGHU MEDICARE</h1>
        <nav class="navbar"><a href="index.html" class="nav-btn">Back to Home</a></nav>
    </header>

    <div class="report-container">
        <h2>CBP & Comprehensive Report</h2>
        <button onclick="window.print()" class="no-print nav-btn">🖨️ Print A4</button>

        <!-- Section 1: Hematology -->
        <div class="section">
            <h3 onclick="reportApp.toggleSection('sec1')">1. Hematology Section ▼</h3>
            <div id="sec1">
                <div class="row header-row no-print"><span></span><strong>Test Name</strong><strong>Result</strong><strong>Ref Range</strong></div>
                <div class="row"><input type="checkbox" checked onclick="reportApp.toggleRow(this)"><label>Hemoglobin</label><input type="text"><label>11.5–17.3 g/dl</label></div>
                <div class="row"><input type="checkbox" checked onclick="reportApp.toggleRow(this)"><label>T.W.B.C</label><input type="text"><label>5000–11000</label></div>
                <!-- Migatha Hematology rows ki kuda ilage 'onclick="reportApp.toggleRow(this)"' add cheyi -->
            </div>
        </div>

        <!-- Section 2: Widal -->
        <div class="section">
            <h3 onclick="reportApp.toggleSection('sec2')">2. Widal & Serology ▼</h3>
            <div id="sec2">
                <div class="row"><input type="checkbox" checked onclick="reportApp.toggleRow(this)"><label>S. Typhi O</label><input type="text"></div>
                <!-- Migatha rows ki kuda ilage cheyi -->
            </div>
        </div>
    </div>

    <script>
        class MedicalReport {
            toggleSection(id) {
                let el = document.getElementById(id);
                el.style.display = (el.style.display === "none") ? "block" : "none";
            }
            toggleRow(cb) {
                cb.parentElement.style.display = cb.checked ? "grid" : "none";
            }
        }
        const reportApp = new MedicalReport();
    </script>
</body>
</html>
