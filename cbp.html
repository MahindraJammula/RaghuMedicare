<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab Report</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .report-section { margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; text-align: left; }
        
        input[type="text"] { width: 90%; padding: 6px; border: 1px solid #999; border-radius: 4px; font-size: 14px; }

        @media print {
            .no-print { display: none !important; }
            input[type="text"] { border: none !important; background: transparent; font-weight: bold; padding: 0; }
            table, th, td { border: none !important; }
        }
        
        .hidden { display: none; }
        button { margin-bottom: 5px; cursor: pointer; padding: 5px 8px; margin-right: 5px; font-size: 11px; }
    </style>
</head>
<body>

    <div class="no-print">
        <button onclick="window.location.href='index.html'">Back to Home</button>
        <button onclick="window.print()">Print Report</button>
        <button onclick="exportToExcel()">Export to Excel</button>
        <hr>
        <button onclick="toggleSection('hematology')">Toggle Hematology</button>
    </div>

    <div id="hematology" class="report-section">
        <h3>Hematology</h3>
        <div class="no-print">
            <strong>Hide Columns:</strong>
            <button onclick="toggleSingleCol('table_hematology', 0)">Test Name</button>
            <button onclick="toggleSingleCol('table_hematology', 1)">Results</button>
            <button onclick="toggleSingleCol('table_hematology', 2)">Reference</button>
            <button onclick="toggleSingleCol('table_hematology', 3)">Unit</button>
        </div>
        <table id="table_hematology">
            <thead>
                <tr>
                    <th>Test Name</th>
                    <th>Results</th>
                    <th>Reference Range</th>
                    <th>Unit</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Hemoglobin</td><td><input type="text" value="13.5"></td><td>12.0 - 16.0</td><td>g/dL</td></tr>
                <tr><td>RBC Count</td><td><input type="text" value="4.5"></td><td>4.0 - 5.5</td><td>mill/cumm</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        function toggleSection(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        // ఒక్కో కాలమ్ హైడ్ చేయడానికి ఫంక్షన్ (index 0, 1, 2, 3)
        function toggleSingleCol(tableId, colIndex) {
            let table = document.getElementById(tableId);
            for (let row of table.rows) {
                let cell = row.cells[colIndex];
                if (cell) cell.classList.toggle('hidden');
            }
        }

        function exportToExcel() {
            // Excel Export logic
            alert("Exporting to Excel...");
        }
    </script>
</body>
</html>
